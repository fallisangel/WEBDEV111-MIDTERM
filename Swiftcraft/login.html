<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCart | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="split-screen">
    <div class="marketing-side">
        <div class="brand-content">
            <h1 class="logo-large">SwiftCart🛒</h1>
            <p>SWIFTTTT__sHooOONGG</p>
        </div>
    </div>

    <div class="form-side">
        <div class="form-card">
            <h2>Welcome Bawchk! *^*</h2>
            <p class="subtitle">Log in to track your packages (^ = ^).</p>
            
            <form>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="1235676767@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn"><a href="index.html"></a></button>
                
                <div class="form-footer">
                    <span>New here? <a href="signup.html">Create an account</a></span>
                </div>
            </form>
        </div>
    </div>
  </div>

</body>
</html>
