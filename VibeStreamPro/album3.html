<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akap | CCS MUSIC</title>
    <link rel="stylesheet" href="music.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="sidewrapper">
        <aside class="navsidebar">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                    <svg viewBox="-0.5 -0.5 16 16" height="30" width="30">
                        <path d="m14.65625 6.8999999999999995 -1.1875 0 -1.7937500000000002 4.18125 -0.59375 0 0 -7.1625000000000005 -0.6 0 -2.38125 10.14375 -0.6 0 0 -13.125 -0.6 0 -2.38125 10.14375 -0.6 0 0 -7.1625000000000005 -0.59375 0 -1.7874999999999999 2.9812499999999997 -1.1937499999999999 0" fill="none" stroke="#ffffff" stroke-miterlimit="10" stroke-width="1.2"></path>
                    </svg>
                    <span style="font-size: 19px; font-weight: 800; color: #fff; font-family: sans-serif;">VibeStream Pro</span>
                </a>
            </div>
            <ul>
                <li class="active"><i class="bi bi-music-note-beamed"></i><a href="index.html">Music</a></li>
                <li><i class="bi bi-globe2"></i><a href="artist.html">Explore</a></li>
                <li><i class="bi bi-collection-fill"></i><a href="#">Collection</a></li>
            </ul>
        </aside>

        <main>
            <div class="main-content">
                <div class="album-banner" style="position: relative; height: 400px; display: flex; align-items: flex-end; padding: 40px; overflow: hidden;">
                    <div class="album-bg-blur" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('album cover/Imago.jpg') center/cover; filter: blur(50px) brightness(0.4); z-index: -1;"></div>
                    <div class="album-header-content" style="display: flex; gap: 30px; align-items: flex-end; position: relative;">
                        <img src="album cover/Imago.jpg" style="width: 250px; height: 250px; border-radius: 4px;">
                        <div class="album-details">
                            <h1 style="font-size: 70px; font-weight: 800;">Blush</h1>
                            <p style="font-size: 18px; font-weight: 600;">Imago • 2006</p>
                        </div>
                    </div>
                </div>
                <div class="track-list" style="padding: 30px;">
                    <div class="track-item" data-index="2">
                        <span>1</span>
                        <div><span style="font-size: 18px; font-weight: 600;">Akap</span></div>
                        <span style="margin-left: auto; color: #888;">4:12</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="footer-player">
        <div class="nowplaying">
            <div class="track-info">
                <img src="" id="footer-img" class="track-cover">
                <div class="track-details">
                    <h4 id="footer-title">Select a song</h4>
                    <p id="footer-artist">-</p>
                </div>
            </div>
            <div class="player-center">
                <div class="player-controls">
                    <button class="play-btn" id="masterPlay"><i class="bi bi-play-circle-fill"></i></button>
                </div>
                <div class="playback-bar">
                    <span id="current-time">0:00</span>
                    <div class="progress-container"><div class="progress-fill"></div></div>
                    <span id="duration-time">0:00</span>
                </div>
            </div>
            <div class="volume-control"><i class="bi bi-volume-up"></i></div>
        </div>
    </div>
    <script src="music.js"></script>
</body>
</html>
