<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStream Pro | Music</title>
    <link rel="stylesheet" href="music.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="sidewrapper">
        <aside class="navsidebar">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                    <svg viewBox="-0.5 -0.5 16 16" height="30" width="30">
                        <path d="m14.65625 6.8999999999999995 -1.1875 0 -1.7937500000000002 4.18125 -0.59375 0 0 -7.1625000000000005 -0.6 0 -2.38125 10.14375 -0.6 0 0 -13.125 -0.6 0 -2.38125 10.14375 -0.6 0 0 -7.1625000000000005 -0.59375 0 -1.7874999999999999 2.9812499999999997 -1.1937499999999999 0" fill="none" stroke="#ffffff" stroke-miterlimit="10" stroke-width="1.2"></path>
                    </svg>
                    <span style="font-size: 19px; font-weight: 800; color: #fff; font-family: sans-serif;">VibeStream Pro</span>
                </a>
            </div>
            <ul>
                <li class="active"><i class="bi bi-music-note-beamed"></i><a href="index.html">Music</a></li>
                <li><i class="bi bi-globe2"></i><a href="artist.html">Explore</a></li>
                <li><i class="bi bi-collection-fill"></i><a href="#">Collection</a></li>
            </ul>
        </aside>

        <main>
            <header class="main-header">
                <div class="nav-arrows">
                    <button class="control-btn"><i class="bi bi-chevron-left"></i></button>
                    <button class="control-btn"><i class="bi bi-chevron-right"></i></button>
                </div>
                <div class="search-container">
                    <i class="bi bi-search"></i>
                    <input type="text" class="search-input" placeholder="What do you want to listen to?">
                </div>
                <div class="auth-buttons" style="display: flex; align-items: center; gap: 20px;">
                    <button class="auth-btn" style="color: #b3b3b3; font-weight: 700; font-size: 16px;"><a href="create.html">Sign up</a></button>
                    <button class="auth-btn" style="background-color: #fff; color: #000; padding: 10px 28px; border-radius: 25px; font-weight: 700; font-size: 16px;"><a href="login.html">Log in</a></button>
                </div>
            </header>

            <div class="album-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; padding: 32px;">
                
                <a href="album1.html" class="album-card">
                    <div class="card-img-container">
                        <img src="album cover/311_ Amber.jpeg" alt="Amber">
                    </div>
                    <span class="card-title">From Chaos</span>
                    <span class="card-artist">311</span>
                </a>

                <a href="album2.html" class="album-card">
                    <div class="card-img-container">
                        <img src="album cover/Albumparadise.jpg" alt="Paradise">
                    </div>
                    <span class="card-title">Paradise</span>
                    <span class="card-artist">Chase Atlantic</span>
                </a>

                <a href="album3.html" class="album-card">
                    <div class="card-img-container">
                        <img src="album cover/Imago.jpg" alt="Blush">
                    </div>
                    <span class="card-title">Akap</span>
                    <span class="card-artist">Imago</span>
                </a>

                <a href="album4.html" class="album-card">
                    <div class="card-img-container">
                        <img src="album cover/MenITrust.jpg" alt="Show Me How">
                    </div>
                    <span class="card-title">Show me How</span>
                    <span class="card-artist">Men I Trust</span>
                </a>

                <a href="album5.html" class="album-card">
                    <div class="card-img-container">
                        <img src="album cover/Blur - Self Titled ( album cover ).jpg" alt="Beetlebum">
                    </div>
                    <span class="card-title">Blur</span>
                    <span class="card-artist">Blur</span>
                </a>

                <a href="album6.html" class="album-card">
                    <div class="card-img-container">
                        <img src="album cover/Dawn FM.jpg" alt="Out of Time">
                    </div>
                    <span class="card-title">Dawn FM</span>
                    <span class="card-artist">The Weeknd</span>
                </a>

                <a href="album7.html" class="album-card">
                    <div class="card-img-container">
                        <img src="album cover/jjk.jpg" alt="Lost Stars">
                    </div>
                    <span class="card-title">Lost Stars</span>
                    <span class="card-artist">JK</span>
                </a>

            </div>
        </main>
    </div>

    <div class="footer-player">
        <div class="nowplaying">
            <div class="track-info">
                <img src="" id="footer-img" class="track-cover" alt="">
                <div class="track-details">
                    <h4 id="footer-title">Select a song</h4>
                    <p id="footer-artist">-</p>
                </div>
            </div>
            <div class="player-center">
                <div class="player-controls">
                    <button class="control-btn" id="prevBtn"><i class="bi bi-skip-start-fill"></i></button>
                    <button class="control-btn play-btn" id="masterPlay"><i class="bi bi-play-circle-fill"></i></button>
                    <button class="control-btn" id="nextBtn"><i class="bi bi-skip-end-fill"></i></button>
                </div>
                <div class="playback-bar">
                    <span id="current-time">0:00</span>
                    <div class="progress-container"><div class="progress-fill"></div></div>
                    <span id="duration-time">0:00</span>
                </div>
            </div>
            <div class="volume-control">
                <i class="bi bi-volume-up"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </div>
        </div>
    </div>

    <script src="music.js"></script>
</body>
</html>
