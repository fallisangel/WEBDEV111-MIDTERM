<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up | CCS MUSIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <svg id="Audio-Wave--Streamline-Atlas" xmlns="http://www.w3.org/2000/svg" viewBox="-0.5 -0.5 16 16" height="30" width="30">
            <path d="m14.65625 6.8999999999999995 -1.1875 0 -1.7937500000000002 4.18125 -0.59375 0 0 -7.1625000000000005 -0.6 0 -2.38125 10.14375 -0.6 0 0 -13.125 -0.6 0 -2.38125 10.14375 -0.6 0 0 -7.1625000000000005 -0.59375 0 -1.7874999999999999 2.9812499999999997 -1.1937499999999999 0" fill="none" stroke="#ffffff" stroke-miterlimit="10" stroke-width="1"></path>
        </svg>
    </div>

    <h3>Sign up</h3>

    <form id="form">
        <div>
            <input type="text" name="firstname" id="firstname-input" placeholder="First Name">
        </div>
        <div>
            <input type="email" name="email" id="email-input" placeholder="Email">
        </div>
        <div>
            <input type="password" name="password" id="password-input" placeholder="Password">
        </div>
        <div>
            <input type="password" name="repeat-password" id="repeat-password-input" placeholder="Repeat password">
        </div>
        <button><a href="index.html">Create Account</a></button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</body>
</html>
