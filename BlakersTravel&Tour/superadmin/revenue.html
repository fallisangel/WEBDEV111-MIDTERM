<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Report | Super Admin</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <header class="top-nav">
        <div class="admin-user">
            <div class="user-info">
                <span class="user-role">Super Admin</span>
                <span class="user-sub">Dashboard</span>
            </div>
            <div class="avatar-circle">SA</div>
        </div>
    </header>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="nav-section">
                <ul>
                    <li><a href="staff.html">STAFF ACCOUNT</a></li>
                    <li><a href="revenue.html" class="active">REVENUE REPORT</a></li>
                </ul>
            </div>
            <div class="sidebar-footer">
                <ul>
                    <li><a href="#">SETTINGS</a></li>
                    <li><a href="../index.html">LOGOUT</a></li>
                </ul>
            </div>
        </aside>

        <main class="content">
            <div class="view-content active">
                <div class="view-card">
                    <h2 class="card-title">Revenue Report</h2>

                    <div class="revenue-stats-row">
                        <div class="rev-stat-box primary">
                            <span class="rev-label">Total Revenue</span>
                            <span class="rev-value">206,000</span>
                        </div>
                        <div class="rev-stat-box secondary">
                            <span class="rev-label">Average Revenue</span>
                            <span class="rev-value">51,500</span>
                        </div>
                        <div class="rev-stat-box secondary">
                            <span class="rev-label">Current Month</span>
                            <span class="rev-value">61,000</span>
                        </div>
                    </div>

                    <table class="custom-table mt-20">
                        <thead>
                            <tr>
                                <th>Month</th>
                                <th>Revenue</th>
                                <th>Growth</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>January</td>
                                <td>45,000</td>
                                <td><span class="growth-badge pos">+12%</span></td>
                            </tr>
                            <tr>
                                <td>February</td>
                                <td>52,000</td>
                                <td><span class="growth-badge neg">-8%</span></td>
                            </tr>
                            <tr>
                                <td>March</td>
                                <td>48,000</td>
                                <td><span class="growth-badge pos">+27%</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/login.js"></script>

</body>
</html>
